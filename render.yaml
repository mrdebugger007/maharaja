services:
  - type: web
    name: maharaja-amruttulya
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    headers:
      - path: /frames/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
